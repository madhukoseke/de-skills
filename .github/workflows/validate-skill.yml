name: Validate Skill

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  validate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: skills/data-engineering-best-practices

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate SKILL.md frontmatter
        run: |
          SKILL_FILE="SKILL.md"
          if ! grep -q "^name:" "$SKILL_FILE"; then
            echo "::error::SKILL.md missing required 'name' in frontmatter"
            exit 1
          fi
          if ! grep -q "^description:" "$SKILL_FILE"; then
            echo "::error::SKILL.md missing required 'description' in frontmatter"
            exit 1
          fi
          echo "Frontmatter validation passed"

      - name: Validate playbook files exist
        run: |
          playbooks=$(grep -oE '\(playbooks/[^)]+\)' SKILL.md | tr -d '()' | sort -u)
          if [ -z "$playbooks" ]; then
            echo "::error::No playbook paths found in SKILL.md"
            exit 1
          fi
          while IFS= read -r f; do
            if [ ! -f "$f" ]; then
              echo "::error::Missing playbook referenced by SKILL.md: $f"
              exit 1
            fi
          done <<< "$playbooks"
          echo "Playbook files validation passed"

      - name: Validate template files exist
        run: |
          templates=$(grep -oE '\(templates/[^)]+\)' SKILL.md | tr -d '()' | sort -u)
          if [ -z "$templates" ]; then
            echo "::error::No template paths found in SKILL.md"
            exit 1
          fi
          while IFS= read -r f; do
            if [ ! -f "$f" ]; then
              echo "::error::Missing template referenced by SKILL.md: $f"
              exit 1
            fi
          done <<< "$templates"
          echo "Template files validation passed"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate E2E harness
        run: |
          ../../tests/run_e2e_harness.sh

      - name: Lint markdown
        run: |
          find ../.. -name "*.md" -not -path "*/.git/*" -not -path "*/node_modules/*" | head -5 && echo "Markdown files found (lint check placeholder — add markdownlint-cli2 when ready)"

      - name: Benchmark quality gate (skill vs baseline)
        run: |
          ../../tests/benchmark/run_skill_vs_no_skill.sh
