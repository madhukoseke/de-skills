name: "Bug Report"
description: "Report incorrect, outdated, or misleading guidance in a playbook, template, or the skill behavior"
title: "[Bug] "
labels:
  - "bug"
body:
  - type: dropdown
    id: component
    attributes:
      label: "Which component has the issue?"
      options:
        - "SKILL.md"
        - "Playbook (specify below)"
        - "Template (specify below)"
        - "CI/Test harness"
        - "Other"
    validations:
      required: true

  - type: textarea
    id: specific_file
    attributes:
      label: "Which specific file?"
      placeholder: "e.g. playbooks/05_data_quality.md"
    validations:
      required: false

  - type: textarea
    id: current_behavior
    attributes:
      label: "What is the current behavior or content?"
    validations:
      required: true

  - type: textarea
    id: expected_behavior
    attributes:
      label: "What is the expected behavior or content?"
    validations:
      required: true

  - type: textarea
    id: steps_to_reproduce
    attributes:
      label: "Steps to reproduce (if skill behavior issue)"
      placeholder: "1. Trigger the skill with prompt... 2. Observe..."
    validations:
      required: false

  - type: checkboxes
    id: before_submitting
    attributes:
      label: "Before submitting"
      options:
        - label: "I searched existing issues"
        - label: "I verified this is still present in the latest version"
